spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**

        - id: artist-service
          uri: lb://artist-service
          predicates:
            - Path=/artists/**

        - id: song-service
          uri: lb://song-service
          predicates:
            - Path=/songs/**

        - id: playlist-service
          uri: lb://playlist-service
          predicates:
            - Path=/playlists/**

        - id: history-service
          uri: lb://history-service
          predicates:
            - Path=/history/**

server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info